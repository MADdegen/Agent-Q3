# =============================================================================
# engine_config.yaml - Agent-Q3 Inference Engine Configuration
#
# PRIMARY:   Local Ollama (always active, zero cost)
# SECONDARY: HuggingFace Router (router.huggingface.co/v1 - OpenAI-compat)
# TERTIARY:  RunPod Serverless (GPU burst, needs positive balance)
# FALLBACK:  OpenRouter (free-tier frontier models)
# =============================================================================

active_engine: "local"   # local | hf_router | runpod | openrouter

# -- Local Ollama --------------------------------------------------------
local:
  base_url: "http://localhost:11434"
  max_loaded_models: 3
  keep_alive: "24h"
  models:
    reasoner:
      tag: "hf.co/unsloth/Qwen2.5-VL-32B-Instruct-GGUF:Q4_K_M"
      role: "multimodal reasoning / deep research / instruction"
      ctx: 32768
      size_gb: 20.6
    support:
      tag: "hf.co/TeichAI/Qwen3-8B-Kimi-K2-Thinking-Distill-GGUF:Q4_K_M"
      role: "hybrid reasoning / support / fast instruct"
      ctx: 32768
      size_gb: 5.0
    coder:
      tag: "hf.co/unsloth/QwQ-32B-GGUF:Q4_K_M"
      role: "deep research / coding / long context"
      ctx: 131072
      size_gb: 19.0

# -- HuggingFace Router --------------------------------------------------
hf_router:
  base_url: "https://router.huggingface.co/v1"
  models:
    reasoner: "Qwen/Qwen2.5-VL-32B-Instruct"
    support:  "Qwen/Qwen3-8B"
    coder:    "Qwen/QwQ-32B"

# -- RunPod Serverless ---------------------------------------------------
runpod:
  endpoint_template: "https://api.runpod.ai/v2/{endpoint_id}/runsync"

# -- OpenRouter fallback -------------------------------------------------
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  models:
    reasoner: "qwen/qwen2.5-vl-32b-instruct"
    support:  "qwen/qwen3-8b"
    coder:    "qwen/qwq-32b"

# -- Perplexity deep research (optional premium) -------------------------
perplexity:
  base_url: "https://api.perplexity.ai"
  default_model: "sonar-deep-research"
  fast_model: "sonar"
