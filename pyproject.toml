[tool.ruff]
line-length = 120
target-version = "py312"
src = ["orchestrator", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
    "N806",   # variable in function should be lowercase
]
fixable = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["orchestrator"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
