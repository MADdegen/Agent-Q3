[tool.ruff]
line-length = 120
target-version = "py312"
src = ["orchestrator", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long
    "F401",   # unused import — handled manually
    "E402",   # module level import not at top
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
