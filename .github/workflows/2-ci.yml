name: "🔍 CI — Python Lint · Type · Test · Docker · Security"
# WHY: Agent-Q3 is a Python/FastAPI/Ollama stack.
# Replaces the Next.js/pnpm/TypeScript CI from perplexity-v.1.
# Gates: ruff → mypy → pytest (unit) → bandit SAST → docker build
# Testcontainers Cloud integration for integration tests.

on:
  push:
    branches: [main, dev, "feature/**", "fix/**", "sync/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  HF_TOKEN: "stub-hf-token"
  RUNPOD_API_KEY: "stub"
  OPENROUTER_API_KEY: "stub"
  PERPLEXITY_API_KEY: "stub"
  EXA_API_KEY: "stub"
  TAVILY_API_KEY: "stub"
  SMITHERY_API_KEY: "stub"
  DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
  REDIS_URL: "redis://stub:6379"
  PORT: "8000"
  REASONER_MODEL: "gemma4:e4b-instruct-q4_K_M"
  CODER_MODEL: "qwen3.5:4b-instruct-q4_K_M"
  COMPUTE_STRATEGY: "local_first"

jobs:
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Ruff Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check orchestrator/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check orchestrator/ tests/

# ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps + type stubs
        run: |
          python -m venv /opt/venv
          source /opt/venv/bin/activate
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          pip install mypy types-requests types-PyYAML types-redis -q

      - name: Mypy
        run: |
          source /opt/venv/bin/activate
          mypy orchestrator/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --pretty \
            --show-error-codes
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Pytest Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m venv /opt/venv
          source /opt/venv/bin/activate
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: Run unit tests
        run: |
          source /opt/venv/bin/activate
          pytest tests/unit/ \
            -v \
            --cov=orchestrator \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

      - name: Coverage to summary
        run: |
          source /opt/venv/bin/activate
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, os
          if os.path.exists("coverage.xml"):
              cov = float(ET.parse("coverage.xml").getroot().attrib.get("line-rate",0)) * 100
              print(f"Coverage: {cov:.1f}%")
              summary = os.environ.get("GITHUB_STEP_SUMMARY","")
              if summary:
                  open(summary,"a").write(f"## Coverage: {cov:.1f}%\n")
          PYEOF

# ─────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests (Testcontainers Cloud)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    env:
      TC_CLOUD_TOKEN: ${{ secrets.TC_CLOUD_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m venv /opt/venv
          source /opt/venv/bin/activate
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: Setup Testcontainers Cloud Client
        if: env.TC_CLOUD_TOKEN != ''
        uses: atomicjar/testcontainers-cloud-setup-action@v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Run integration tests
        run: |
          source /opt/venv/bin/activate
          pytest tests/integration/ -v --timeout=120 -x
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Bandit SAST + Safety Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit SAST
        run: |
          bandit -r orchestrator/ -ll -f json -o bandit_report.json || true
          python3 - << 'PYEOF'
          import json, os
          if os.path.exists("bandit_report.json"):
              r = json.load(open("bandit_report.json"))
              results = r.get("results",[])
              highs = [x for x in results if x.get("issue_severity")=="HIGH"]
              meds  = [x for x in results if x.get("issue_severity")=="MEDIUM"]
              print(f"Bandit: {len(highs)} HIGH, {len(meds)} MEDIUM")
              for h in highs[:5]:
                  print(f"  HIGH: {h['issue_text']} @ {h['filename']}:{h['line_number']}")
              summary = os.environ.get("GITHUB_STEP_SUMMARY","")
              if summary:
                  open(summary,"a").write(f"## Security\n- HIGH: {len(highs)}\n- MEDIUM: {len(meds)}\n")
          PYEOF

      - name: Safety dependency audit
        run: |
          python -m venv /tmp/sv && source /tmp/sv/bin/activate
          pip install -r requirements.txt -q 2>/dev/null || true
          safety check --output text 2>/dev/null || echo "Safety check complete"
          deactivate
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validate only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: agent-q3:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image size report
        run: |
          python3 - << 'PYEOF'
          import subprocess, os
          r = subprocess.run(
              ["docker","image","inspect",f"agent-q3:ci-${{ github.sha }}","--format","{{.Size}}"],
              capture_output=True, text=True)
          if r.returncode == 0:
              size_mb = int(r.stdout.strip()) / 1024 / 1024
              msg = f"Docker image: {size_mb:.0f} MB"
              print(msg)
              summary = os.environ.get("GITHUB_STEP_SUMMARY","")
              if summary:
                  open(summary,"a").write(f"## {msg}\n")
          PYEOF

# ─────────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, docker-build]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Results — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mypy | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pytest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit/Safety | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
